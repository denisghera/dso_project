name: WordPress WPScan

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  wpscan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment variables
        run: |
          cp .env.example .env

      - name: Build and start WordPress
        run: |
          docker compose --env-file .env -f docker/docker-compose.yml up -d --build

      - name: Wait for WP-CLI automated setup to complete
        run: |
          echo "Waiting for the wp-cli-setup container to finish..."
          EXIT_CODE=$(docker wait wp-cli-setup)
          
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "Setup failed! Fetching logs..."
            docker logs wp-cli-setup
            exit 1
          else
            echo "WordPress and plugins are fully installed!"
          fi

      - name: Run WPScan
        env:
          WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
        run: |
          mkdir -p scans
          TS=$(date +"%Y%m%d-%H%M%S")
          docker run --rm --network host wpscanteam/wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt,tt \
            --plugins-detection aggressive \
            --api-token "$WPSCAN_API_TOKEN" \
            --format json --output "scans/wpscan-${TS}.json" \
            --no-color --no-update --force

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-results
          path: scans/
