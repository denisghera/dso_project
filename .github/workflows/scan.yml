name: WordPress WPSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  wpscan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment variables
        run: cp .env.example .env

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hardened image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.hardened
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wp-hardened-lab:latest
            ghcr.io/${{ github.repository_owner }}/wp-hardened-lab:latest

      - name: Build and start WordPress
        run: docker compose --env-file .env -f docker/docker-compose.yml up -d

      - name: Wait for WP-CLI automated setup to complete
        run: |
          echo "Waiting for the wp-cli-setup container to finish..."
          EXIT_CODE=$(docker wait wp-cli-setup)

          if [ "$EXIT_CODE" -ne 0 ]; then
            docker logs wp-cli-setup
            exit 1
          fi

      - name: Run WPScan
        continue-on-error: true
        env:
          WPSCAN_API_TOKEN: ${{ secrets.WPSCAN_API_TOKEN }}
        run: |
          mkdir -p scans
          chmod 777 scans
          TS=$(date +"%Y%m%d-%H%M%S")
          
          docker run --rm --network host \
            -v "$(pwd)/scans:/output" \
            wpscanteam/wpscan \
            --url http://localhost:8080 \
            --enumerate u,vp,vt,tt \
            --plugins-detection aggressive \
            --api-token "$WPSCAN_API_TOKEN" \
            --format json \
            --output "/output/wpscan-${TS}.json" \
            --no-update --force

      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-results
          path: scans/
