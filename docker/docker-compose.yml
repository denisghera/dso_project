services:
  db:
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hardened
    depends_on:
      - db
    ports:
      - "8080:8080" 
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DEBUG: "false"
    volumes:
      - wp_data:/var/www/html
    restart: unless-stopped

  wp-cli:
    image: wordpress:cli-php7.4
    container_name: wp-cli-setup # Added for predictable CI targeting
    depends_on:
      - wordpress
    working_dir: /var/www/html
    user: root
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    volumes:
      - wp_data:/var/www/html
    entrypoint: /bin/sh
    command: >
      -lc "
      set -e;
      if [ ! -f /var/www/html/wp-settings.php ]; then
        echo 'Waiting for WordPress files...';
        for i in $$(seq 1 30); do
          if [ -f /var/www/html/wp-settings.php ]; then break; fi; sleep 5;
        done;
      fi;
      if [ ! -f /var/www/html/wp-config.php ]; then
        wp config create --dbname=\"${MYSQL_DATABASE}\" --dbuser=\"${MYSQL_USER}\" --dbpass=\"${MYSQL_PASSWORD}\" --dbhost=\"${WORDPRESS_DB_HOST}\" --allow-root;
      fi;
      echo 'Waiting for database...';
      for i in $$(seq 1 30); do
        if wp db check --allow-root >/dev/null 2>&1; then break; fi; sleep 5;
      done;
      if ! wp core is-installed --allow-root >/dev/null 2>&1; then
        wp core install --url='http://localhost:8080' --title='WP Scan Lab' --admin_user=\"${WP_ADMIN_USER}\" --admin_password=\"${WP_ADMIN_PASSWORD}\" --admin_email=\"${WP_ADMIN_EMAIL}\" --skip-email --allow-root;
      fi;
            
      # 1. Patch Plugins (No longer pinning to vulnerable versions)
      wp plugin install contact-form-7 --allow-root --activate;
      wp plugin install hello-dolly --allow-root --activate;
      
      # 2. Hardening: Disable XML-RPC to prevent DDoS/Brute Force
      wp config set XMLRPC_REQUEST false --raw --allow-root;
      
      # 3. Hardening: Remove default informational files
      rm -f /var/www/html/readme.html /var/www/html/license.txt;
      
      echo 'WP-CLI setup and hardening completed successfully.';
      "

volumes:
  db_data:
  wp_data:
