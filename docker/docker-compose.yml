services:
  db:
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    image: wordpress:6.0.3
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DEBUG: "true"
      WORDPRESS_DEBUG_LOG: /var/www/html/wp-content/debug.log
      WORDPRESS_DEBUG_DISPLAY: "true"
    volumes:
      - wp_data:/var/www/html
    restart: unless-stopped

  wp-cli:
    image: wordpress:cli-php7.4
    depends_on:
      - wordpress
    working_dir: /var/www/html
    user: root
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
    volumes:
      - wp_data:/var/www/html
    entrypoint: /bin/sh
    command: >
      -lc "
      set -e;
      if [ ! -f /var/www/html/wp-settings.php ]; then
        echo 'Downloading WordPress core...';
        wp core download --version=6.0.3 --force --allow-root;
      fi;
      if [ ! -f /var/www/html/wp-config.php ]; then
        echo 'Creating wp-config.php...';
        wp config create --dbname="${MYSQL_DATABASE}" --dbuser="${MYSQL_USER}" --dbpass="${MYSQL_PASSWORD}" --dbhost="${WORDPRESS_DB_HOST}" --allow-root;
      fi;
      echo 'Waiting for database...';
      for i in $(seq 1 30); do
        if wp db check --allow-root >/dev/null 2>&1; then
          echo 'Database is ready.';
          break;
        fi;
        sleep 5;
      done;
      if ! wp db check --allow-root >/dev/null 2>&1; then
        echo 'Database did not become ready in time.';
        exit 1;
      fi;
      if ! wp core is-installed --allow-root >/dev/null 2>&1; then
        echo 'Installing WordPress...';
        wp core install --url='http://localhost:8080' --title='WP Scan Lab' --admin_user="${WP_ADMIN_USER}" --admin_password="${WP_ADMIN_PASSWORD}" --admin_email="${WP_ADMIN_EMAIL}" --skip-email --allow-root;
      fi;
      wp plugin install contact-form-7 --version=5.3.2 --allow-root --activate;
      wp plugin install hello-dolly --version=1.7.2 --allow-root --activate;
      echo 'WP-CLI plugins installed.';
      "

volumes:
  db_data:
  wp_data:
